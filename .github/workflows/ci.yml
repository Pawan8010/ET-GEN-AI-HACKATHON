name: OpsBrain verification

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install frontend dependencies
        run: npm ci
      - name: Install backend dependencies
        run: python -m pip install -e './backend[dev]'
      - name: Run complete verification
        run: npm run verify
