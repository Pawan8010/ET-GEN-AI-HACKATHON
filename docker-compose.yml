name: opsbrain

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment: &backend-environment
      OPSBRAIN_ENVIRONMENT: ${OPSBRAIN_ENVIRONMENT:-development}
      OPSBRAIN_DATABASE_URL: postgresql+asyncpg://opsbrain:${POSTGRES_PASSWORD:-opsbrain-dev}@postgres:5432/opsbrain
      OPSBRAIN_REDIS_URL: redis://redis:6379/0
      OPSBRAIN_QDRANT_URL: http://qdrant:6333
      OPSBRAIN_NEO4J_URI: bolt://neo4j:7687
      OPSBRAIN_OBJECT_STORE_ENDPOINT: http://minio:9000
      OPSBRAIN_FIREBASE_PROJECT_ID: ${OPSBRAIN_FIREBASE_PROJECT_ID:-}
      OPSBRAIN_GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      qdrant: { condition: service_healthy }
      neo4j: { condition: service_healthy }
      minio: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment: *backend-environment
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: opsbrain
      POSTGRES_USER: opsbrain
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opsbrain-dev}
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsbrain -d opsbrain"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes: ["redis-data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.13.6
    volumes: ["qdrant-data:/qdrant/storage"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 3s
      retries: 20

  neo4j:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-opsbrain-dev-password}
    volumes: ["neo4j-data:/data"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:7474 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-opsbrain}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-opsbrain-dev-password}
    volumes: ["minio-data:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  clamav:
    image: clamav/clamav:1.4
    volumes: ["clamav-data:/var/lib/clamav"]
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 20

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  neo4j-data:
  minio-data:
  clamav-data:
